<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOENIX Agent — Multi-Agent AI Platform</title>
    <meta name="description" content="PHOENIX Agent is a multi-agent AI platform. Upload files, analyze code, push to GitHub, and chat with AI using your own API keys or our infrastructure.">
    <meta name="keywords" content="AI, multi-agent, GitHub, code analysis, chatbot, OpenAI, Gemini">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://phoenix-agent.fly.dev">
    <meta property="og:title" content="PHOENIX Agent — Multi-Agent AI Platform">
    <meta property="og:description" content="Upload files, analyze code, push to GitHub, and chat with AI using your own API keys or our infrastructure.">
    <meta property="og:image" content="https://phoenix-agent.fly.dev/static/og-card.png">
    <meta property="og:site_name" content="PHOENIX Agent">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PHOENIX Agent — Multi-Agent AI Platform">
    <meta name="twitter:description" content="Upload files, analyze code, push to GitHub, and chat with AI using your own API keys or our infrastructure.">
    <meta name="twitter:image" content="https://phoenix-agent.fly.dev/static/og-card.png">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --bg-card: #16162a;
            --bg-hover: #1e1e3a;
            --border: #2a2a4a;
            --border-hover: #3a3a6a;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #6a6a8a;
            --accent: #ff6b35;
            --accent-light: #ff8c5a;
            --accent-glow: rgba(255, 107, 53, 0.25);
            --accent-secondary: #00d4aa;
            --accent-purple: #a855f7;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Background */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,107,53,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,53,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 800px; height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            top: -300px; right: -300px;
            pointer-events: none;
            z-index: 0;
            animation: float 10s ease-in-out infinite;
        }

        .bg-glow-2 {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168,85,247,0.08), transparent 70%);
            bottom: -200px; left: -200px;
            pointer-events: none;
            z-index: 0;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 40px); }
        }

        /* Layout */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100vh;
            left: 0; top: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 24px var(--accent-glow);
            flex-shrink: 0;
        }

        .logo-text {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo-text span { color: var(--accent); }

        .nav-section { margin-bottom: 20px; }

        .nav-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 12px;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(255,107,53,0.12), rgba(255,107,53,0.04));
            color: var(--accent);
            border-color: rgba(255,107,53,0.15);
        }

        .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; }

        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: none;
            margin-bottom: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .session-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 280px;
            overflow-y: auto;
        }

        .session-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .session-item.active {
            background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,107,53,0.02));
            color: var(--accent);
            border-color: rgba(255,107,53,0.1);
        }

        .session-item .session-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-item .delete-btn {
            margin-left: auto;
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 16px;
            line-height: 1;
        }

        .session-item:hover .delete-btn { opacity: 1; }
        .session-item .delete-btn:hover { color: var(--danger); }

        .user-section {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: var(--bg-tertiary);
        }

        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-details { flex: 1; min-width: 0; }
        .user-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-email { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; }

        .logout-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .logout-btn:hover { background: rgba(239,68,68,0.1); color: var(--danger); }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 24px 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .page-title span { color: var(--accent); }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 30px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { background: var(--border-hover); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        .btn-success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .btn-sm { padding: 6px 14px; font-size: 12px; }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .card-action {
            margin-top: 16px;
        }

        /* Chat Interface */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }

        .message-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
            color: white;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent));
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-content pre {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li { margin: 4px 0; }

        .chat-input-container {
            display: flex;
            gap: 12px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 52px;
            max-height: 150px;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .chat-actions {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .chat-action-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .chat-action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .chat-action-btn.send {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border: none;
        }

        .chat-action-btn.send:hover { transform: scale(1.05); }

        /* Model Selector */
        .model-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            padding: 0 4px;
        }

        .model-chip {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .model-chip:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .model-chip.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border-color: var(--accent);
        }

        .model-chip .provider-badge {
            font-size: 9px;
            opacity: 0.7;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Forms */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .toggle-switch input { display: none; }

        .toggle-slider {
            width: 44px; height: 24px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            position: relative;
            transition: all 0.3s;
            border: 1px solid var(--border);
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            background: var(--text-muted);
            border-radius: 50%;
            top: 2px; left: 2px;
            transition: all 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-color: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::after {
            transform: translateX(20px);
            background: white;
        }

        .toggle-label {
            font-size: 14px;
            font-weight: 500;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-card);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(255,107,53,0.03);
        }

        .upload-area.dragover { border-style: solid; }

        .upload-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .upload-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .upload-hint { font-size: 13px; color: var(--text-muted); }

        /* File List */
        .file-list { display: flex; flex-direction: column; gap: 8px; }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .file-item:hover { border-color: var(--border-hover); }

        .file-icon { font-size: 24px; flex-shrink: 0; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .file-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            padding: 20px;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal { transform: scale(1); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .modal-title { font-size: 20px; font-weight: 700; }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .modal-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-footer .btn { flex: 1; }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            animation: toastSlide 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
            backdrop-filter: blur(8px);
        }

        @keyframes toastSlide {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .toast.info {
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        /* Auth Pages */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .auth-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin: 0 auto 24px;
            box-shadow: 0 8px 40px var(--accent-glow);
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .auth-toggle {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-toggle a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }

        .auth-toggle a:hover { text-decoration: underline; }

        /* Loading */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Landing Page */
        .landing-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .landing-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
            position: relative;
        }

        .landing-hero .hero-logo {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 32px;
            box-shadow: 0 12px 60px var(--accent-glow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .landing-hero h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .landing-hero h1 span { color: var(--accent); }

        .landing-hero .hero-tagline {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 560px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .landing-hero .hero-cta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .landing-hero .hero-cta .btn {
            padding: 14px 32px;
            font-size: 16px;
        }

        .landing-features {
            padding: 80px 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .landing-features h2 {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 48px;
        }

        .landing-features h2 span { color: var(--accent); }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: all 0.3s;
        }

        .feature-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.3);
        }

        .feature-card .feature-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .feature-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .feature-card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border);
            padding: 40px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
        }

        .footer-brand span { color: var(--accent); }

        .footer-links {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--accent); }

        /* Task List */
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .task-item:hover { border-color: var(--border-hover); }

        .task-status {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .task-status.pending { background: var(--warning); }
        .task-status.running { background: var(--accent); animation: pulse 1s infinite; }
        .task-status.completed { background: var(--success); }
        .task-status.failed { background: var(--danger); }

        .task-info { flex: 1; }
        .task-type { font-size: 14px; font-weight: 500; }
        .task-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* Repo List */
        .repo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .repo-item:hover { border-color: var(--border-hover); }

        .repo-icon { font-size: 20px; }
        .repo-info { flex: 1; }
        .repo-name { font-size: 14px; font-weight: 500; }
        .repo-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .repo-stats { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; }
            .card-grid { grid-template-columns: 1fr; }
            .chat-container { height: calc(100vh - 80px); }
            .landing-hero h1 { font-size: 36px; }
            .features-grid { grid-template-columns: 1fr; }
        }

        /* Hidden */
        .hidden { display: none !important; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .empty-state-desc { font-size: 14px; max-width: 400px; margin: 0 auto; }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success { background: rgba(34,197,94,0.1); color: var(--success); }
        .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
        .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
        .badge-info { background: rgba(59,130,246,0.1); color: #3b82f6; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div id="app"></div>
    <div class="toast-container" id="toastContainer"></div>

    <script>

        // ===== STATE =====
        const state = {
            token: localStorage.getItem('phoenix_token'),
            user: JSON.parse(localStorage.getItem('phoenix_user') || 'null'),
            currentPage: 'landing',
            currentSession: null,
            sessions: [],
            messages: [],
            models: [],
            selectedModel: null,
            uploads: [],
            tasks: [],
            repos: [],
            isLoading: false,
            view: 'landing' // landing, auth, app
        };

        const API_BASE = '';

        // ===== UTILS =====
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ';
            toast.innerHTML = `<span>${icon}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function api(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (state.token) {
                headers['Authorization'] = `Bearer ${state.token}`;
            }

            const response = await fetch(url, {
                ...options,
                headers
            });

            if (response.status === 401) {
                state.token = null;
                state.user = null;
                localStorage.removeItem('phoenix_token');
                localStorage.removeItem('phoenix_user');
                state.view = 'auth';
                renderAuth();
                throw new Error('Session expired. Please sign in again.');
            }

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.detail || `HTTP ${response.status}`);
            }

            return response.json();
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function markdownToHtml(text) {
            if (!text) return '';
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```([\w]*?)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Convert URLs to links
            html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline;">$1</a>');

            return html.replace(/\n/g, '<br>');
        }

        // ===== RENDER =====
        function render() {
            const app = document.getElementById('app');
            if (state.view === 'landing') {
                app.innerHTML = renderLandingPage();
            } else if (state.view === 'auth') {
                app.innerHTML = renderAuthPage();
            } else {
                app.innerHTML = renderAppPage();
            }
            attachEvents();
        }

        function renderLandingPage() {
            return `
                <div class="landing-page">
                    <div class="landing-hero">
                        <div class="hero-logo">🔥</div>
                        <h1><span>PHOENIX</span> Agent</h1>
                        <p class="hero-tagline">
                            The multi-agent AI platform that uploads files, analyzes code, 
                            pushes to GitHub, and chats with AI using your own API keys or our infrastructure.
                        </p>
                        <div class="hero-cta">
                            <button class="btn btn-primary" id="landingGetStarted">
                                <span>🚀</span> Get Started
                            </button>
                            <button class="btn btn-secondary" id="landingSignIn">
                                <span>🔑</span> Sign In
                            </button>
                        </div>
                    </div>

                    <div class="landing-features">
                        <h2>Why <span>PHOENIX</span> Agent?</h2>
                        <div class="features-grid">
                            <div class="feature-card">
                                <div class="feature-icon" style="background: rgba(255,107,53,0.1);">💬</div>
                                <h3>AI Chat</h3>
                                <p>Chat with multiple AI models. Use our infrastructure or bring your own OpenAI or Gemini API keys.</p>
                            </div>
                            <div class="feature-card">
                                <div class="feature-icon" style="background: rgba(0,212,170,0.1);">📁</div>
                                <h3>File Upload</h3>
                                <p>Upload any file type — ZIP, code, documents. Extract, analyze, and push to GitHub automatically.</p>
                            </div>
                            <div class="feature-card">
                                <div class="feature-icon" style="background: rgba(168,85,247,0.1);">🐙</div>
                                <h3>GitHub Integration</h3>
                                <p>Create repositories, push ZIP contents, and manage your code directly from the chat interface.</p>
                            </div>
                            <div class="feature-card">
                                <div class="feature-icon" style="background: rgba(59,130,246,0.1);">🤖</div>
                                <h3>Multi-Agent System</h3>
                                <p>Code review, file analysis, GitHub operations — all powered by intelligent agents working together.</p>
                            </div>
                            <div class="feature-card">
                                <div class="feature-icon" style="background: rgba(245,158,11,0.1);">🔐</div>
                                <h3>Bring Your Own Keys</h3>
                                <p>Use your own OpenAI or Google Gemini API keys. Toggle infrastructure on/off anytime in settings.</p>
                            </div>
                            <div class="feature-card">
                                <div class="feature-icon" style="background: rgba(34,197,94,0.1);">⚡</div>
                                <h3>Fast & Secure</h3>
                                <p>Built on FastAPI with Neon PostgreSQL. JWT authentication, encrypted sessions, and persistent chat history.</p>
                            </div>
                        </div>
                    </div>

                    <div class="footer">
                        <div class="footer-brand">
                            <span style="font-size:20px;">🔥</span>
                            PHOENIX <span>Agent</span>
                        </div>
                        <div class="footer-links">
                            <a href="#" id="footerGetStarted">Get Started</a>
                            <a href="#" id="footerSignIn">Sign In</a>
                            <a href="https://github.com" target="_blank">GitHub</a>
                        </div>
                        <div>© 2026 PHOENIX Agent. Built with 🔥 by Phoenix.</div>
                    </div>
                </div>
            `;
        }

        function renderAuthPage() {
            return `
                <div class="auth-container">
                    <div class="auth-card">
                        <div class="auth-logo">🔥</div>
                        <h1 class="auth-title">Welcome to <span style="color:var(--accent)">PHOENIX</span></h1>
                        <p class="auth-subtitle">Multi-Agent AI Platform</p>

                        <div id="authForm">
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" id="authEmail" placeholder="you@example.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-input" id="authPassword" placeholder="••••••••">
                            </div>
                            <div class="form-group hidden" id="nameGroup">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-input" id="authName" placeholder="John Doe">
                            </div>
                            <button class="btn btn-primary" style="width:100%;" id="authBtn">
                                <span>Sign In</span>
                            </button>
                        </div>

                        <div class="auth-toggle">
                            <span id="authToggleText">Don't have an account?</span>
                            <a id="authToggle">Sign Up</a>
                        </div>

                        <div style="margin-top: 20px;">
                            <a id="backToLanding" style="color: var(--text-muted); font-size: 13px; cursor: pointer;">← Back to home</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAppPage() {
            return `
                <div class="app-container">
                    ${renderSidebar()}
                    <div class="main-content">
                        ${renderPageContent()}
                    </div>
                </div>
            `;
        }

        function renderSidebar() {
            const navItems = [
                { id: 'chat', label: 'Chat', icon: '💬' },
                { id: 'upload', label: 'Files', icon: '📁' },
                { id: 'github', label: 'GitHub', icon: '🐙' },
                { id: 'agent', label: 'Agent Tasks', icon: '🤖' },
                { id: 'settings', label: 'Settings', icon: '⚙️' },
            ];

            return `
                <div class="sidebar">
                    <div class="logo">
                        <div class="logo-icon">P</div>
                        <div class="logo-text">PHOENIX <span>Agent</span></div>
                    </div>

                    <button class="new-chat-btn" id="newChatBtn">
                        <span>✨</span> New Chat
                    </button>

                    <div class="nav-section">
                        <div class="nav-title">Navigation</div>
                        ${navItems.map(item => `
                            <div class="nav-item ${state.currentPage === item.id ? 'active' : ''}" data-page="${item.id}">
                                <span class="nav-icon">${item.icon}</span>
                                ${item.label}
                            </div>
                        `).join('')}
                    </div>

                    <div class="nav-section">
                        <div class="nav-title">Recent Chats</div>
                        <div class="session-list" id="sessionList">
                            ${state.sessions.length === 0 ? 
                                '<div style="padding: 8px 12px; color: var(--text-muted); font-size: 12px;">No chats yet</div>' : 
                                state.sessions.slice(0, 10).map(s => `
                                    <div class="session-item ${state.currentSession === s.id ? 'active' : ''}" data-session="${s.id}">
                                        <span>💬</span>
                                        <span class="session-title">${escapeHtml(s.title || 'New Chat')}</span>
                                        <button class="delete-btn" data-delete="${s.id}" title="Delete chat">×</button>
                                    </div>
                                `).join('')
                            }
                        </div>
                    </div>

                    <div class="user-section">
                        <div class="user-info">
                            <div class="user-avatar">${(state.user?.full_name || state.user?.email || 'U')[0].toUpperCase()}</div>
                            <div class="user-details">
                                <div class="user-name">${escapeHtml(state.user?.full_name || 'User')}</div>
                                <div class="user-email">${escapeHtml(state.user?.email || '')}</div>
                            </div>
                            <button class="logout-btn" id="logoutBtn" title="Logout">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPageContent() {
            switch (state.currentPage) {
                case 'chat': return renderChatPage();
                case 'upload': return renderUploadPage();
                case 'github': return renderGitHubPage();
                case 'agent': return renderAgentPage();
                case 'settings': return renderSettingsPage();
                default: return renderChatPage();
            }
        }

        function renderChatPage() {
            return `
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        ${state.messages.length === 0 ? `
                            <div class="empty-state">
                                <div class="empty-state-icon">🔥</div>
                                <div class="empty-state-title">Start a conversation</div>
                                <div class="empty-state-desc">
                                    Ask PHOENIX anything — code help, file analysis, GitHub operations, or general questions.
                                    <br><br>
                                    <span style="color: var(--accent);">Tip:</span> Upload a ZIP and say "create a repo and push this"
                                </div>
                            </div>
                        ` : state.messages.map(m => `
                            <div class="message ${m.role}">
                                <div class="message-avatar">${m.role === 'user' ? (state.user?.full_name?.[0] || 'U') : 'P'}</div>
                                <div class="message-content">${markdownToHtml(m.content)}</div>
                            </div>
                        `).join('')}
                        <div id="typingIndicator" class="hidden">
                            <div class="message assistant">
                                <div class="message-avatar">P</div>
                                <div class="message-content">
                                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="model-selector" id="modelSelector">
                        ${state.models.length === 0 ? '' : state.models.map(m => `
                            <div class="model-chip ${state.selectedModel === m.id ? 'active' : ''}" data-model="${m.id}" data-provider="${m.provider}">
                                ${m.name}
                                <span class="provider-badge">${m.provider}</span>
                            </div>
                        `).join('')}

        // ===== EVENTS =====
        function attachEvents() {
            // Landing page
            document.getElementById('landingGetStarted')?.addEventListener('click', () => {
                state.view = 'auth';
                render();
            });
            document.getElementById('landingSignIn')?.addEventListener('click', () => {
                state.view = 'auth';
                render();
            });
            document.getElementById('footerGetStarted')?.addEventListener('click', (e) => {
                e.preventDefault();
                state.view = 'auth';
                render();
            });
            document.getElementById('footerSignIn')?.addEventListener('click', (e) => {
                e.preventDefault();
                state.view = 'auth';
                render();
            });

            // Auth page
            document.getElementById('backToLanding')?.addEventListener('click', () => {
                state.view = 'landing';
                render();
            });

            let isSignUp = false;
            const toggle = document.getElementById('authToggle');
            const btn = document.getElementById('authBtn');
            const nameGroup = document.getElementById('nameGroup');
            const toggleText = document.getElementById('authToggleText');

            toggle?.addEventListener('click', () => {
                isSignUp = !isSignUp;
                btn.innerHTML = `<span>${isSignUp ? 'Sign Up' : 'Sign In'}</span>`;
                toggleText.textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
                toggle.textContent = isSignUp ? 'Sign In' : 'Sign Up';
                nameGroup.classList.toggle('hidden', !isSignUp);
            });

            btn?.addEventListener('click', async () => {
                const email = document.getElementById('authEmail').value;
                const password = document.getElementById('authPassword').value;
                const fullName = document.getElementById('authName')?.value || '';

                if (!email || !password) {
                    showToast('Please fill all fields', 'error');
                    return;
                }

                btn.innerHTML = '<div class="spinner"></div>';

                try {
                    const endpoint = isSignUp ? '/api/auth/signup' : '/api/auth/signin';
                    const body = isSignUp 
                        ? { email, password, full_name: fullName }
                        : { email, password };

                    const data = await api(endpoint, {
                        method: 'POST',
                        body: JSON.stringify(body)
                    });

                    state.token = data.access_token;
                    state.user = data.user;
                    localStorage.setItem('phoenix_token', data.access_token);
                    localStorage.setItem('phoenix_user', JSON.stringify(data.user));

                    showToast(isSignUp ? 'Account created!' : 'Welcome back!');
                    await initApp();
                } catch (err) {
                    showToast(err.message, 'error');
                    btn.innerHTML = `<span>${isSignUp ? 'Sign Up' : 'Sign In'}</span>`;
                }
            });

            // App events
            if (state.view === 'app') {
                // Navigation
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => {
                        state.currentPage = item.dataset.page;
                        state.currentSession = null;
                        state.messages = [];
                        render();
                    });
                });

                // New chat
                document.getElementById('newChatBtn')?.addEventListener('click', () => {
                    state.currentSession = null;
                    state.messages = [];
                    state.currentPage = 'chat';
                    render();
                });

                // Session list
                document.querySelectorAll('.session-item').forEach(item => {
                    item.addEventListener('click', async (e) => {
                        if (e.target.classList.contains('delete-btn') || e.target.closest('.delete-btn')) {
                            e.stopPropagation();
                            const sessionId = e.target.closest('.delete-btn').dataset.delete;
                            await deleteSession(sessionId);
                            return;
                        }
                        state.currentSession = item.dataset.session;
                        state.currentPage = 'chat';
                        await loadSessionMessages(item.dataset.session);
                        render();
                    });
                });

                // Logout
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    state.token = null;
                    state.user = null;
                    state.view = 'landing';
                    localStorage.removeItem('phoenix_token');
                    localStorage.removeItem('phoenix_user');
                    render();
                    showToast('Logged out successfully');
                });

                // Page-specific
                if (state.currentPage === 'chat') attachChatEvents();
                if (state.currentPage === 'upload') attachUploadEvents();
                if (state.currentPage === 'github') attachGitHubEvents();
                if (state.currentPage === 'settings') attachSettingsEvents();
            }
        }

        function attachChatEvents() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');

            input?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            input?.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });

            sendBtn?.addEventListener('click', sendMessage);

            document.querySelectorAll('.model-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    state.selectedModel = chip.dataset.model;
                    document.querySelectorAll('.model-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                });
            });

            document.getElementById('attachBtn')?.addEventListener('click', () => {
                state.currentPage = 'upload';
                render();
            });
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || state.isLoading) return;

            input.value = '';
            input.style.height = 'auto';
            state.messages.push({ role: 'user', content: message });
            render();

            state.isLoading = true;
            document.getElementById('typingIndicator').classList.remove('hidden');

            try {
                const data = await api('/api/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({
                        session_id: state.currentSession,
                        message: message,
                        model: state.selectedModel
                    })
                });

                state.currentSession = data.session_id;
                state.messages.push({ role: 'assistant', content: data.message });
                await loadSessions();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                state.isLoading = false;
                render();
            }
        }

        async function loadSessionMessages(sessionId) {
            try {
                const data = await api(`/api/chat/sessions/${sessionId}/messages`);
                state.messages = data.map(m => ({ role: m.role, content: m.content }));
            } catch (e) {
                console.error('Failed to load messages', e);
            }
        }

        async function deleteSession(sessionId) {
            try {
                await api(`/api/chat/sessions/${sessionId}`, { method: 'DELETE' });
                state.sessions = state.sessions.filter(s => s.id !== sessionId);
                if (state.currentSession === sessionId) {
                    state.currentSession = null;
                    state.messages = [];
                }
                render();
                showToast('Chat deleted');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function attachUploadEvents() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea?.addEventListener('click', () => fileInput?.click());
            uploadArea?.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            uploadArea?.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
            uploadArea?.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            fileInput?.addEventListener('change', (e) => handleFiles(e.target.files));

            document.getElementById('uploadFileBtn')?.addEventListener('click', () => fileInput?.click());

            document.querySelectorAll('.analyze-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const fileId = btn.dataset.file;
                    showAnalyzeModal(fileId);
                });
            });
        }

        async function handleFiles(files) {
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(`${API_BASE}/api/upload/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${state.token}` },
                        body: formData
                    });
                    const data = await response.json();
                    if (response.ok) {
                        showToast(`Uploaded: ${file.name}`);
                        state.uploads.unshift(data);
                    } else {
                        throw new Error(data.detail || 'Upload failed');
                    }
                } catch (e) {
                    showToast(e.message || `Failed to upload ${file.name}`, 'error');
                }
            }
            render();
        }

        async function deleteFile(fileId) {
            try {
                await api(`/api/upload/${fileId}`, { method: 'DELETE' });
                state.uploads = state.uploads.filter(f => f.id !== fileId);
                render();
                showToast('File deleted');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        // ===== MODALS =====
        function showModal({ title, subtitle, inputType = 'text', inputPlaceholder = '', confirmText = 'Confirm', onConfirm, showInput = true }) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3 class="modal-title">${title}</h3>
                        <button class="modal-close" id="modalClose">×</button>
                    </div>
                    <p class="modal-subtitle">${subtitle}</p>
                    ${showInput ? `<input type="${inputType}" class="form-input" id="modalInput" placeholder="${inputPlaceholder}">` : ''}
                    <div class="modal-footer">
                        <button class="btn btn-secondary" id="modalCancel">Cancel</button>
                        <button class="btn btn-primary" id="modalConfirm">${confirmText}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const close = () => overlay.remove();

            document.getElementById('modalClose')?.addEventListener('click', close);
            document.getElementById('modalCancel')?.addEventListener('click', close);
            document.getElementById('modalConfirm')?.addEventListener('click', () => {
                const value = showInput ? document.getElementById('modalInput').value : '';
                if (!showInput || value) {
                    onConfirm(value);
                    close();
                }
            });

            if (showInput) {
                document.getElementById('modalInput')?.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        document.getElementById('modalConfirm')?.click();
                    }
                });
                setTimeout(() => document.getElementById('modalInput')?.focus(), 100);
            }
        }

        function showPushZipModal() {
            showModal({
                title: 'Push ZIP to Repository',
                subtitle: 'Enter the GitHub repository URL to push to:',
                inputPlaceholder: 'https://github.com/username/repo',
                confirmText: 'Next: Select ZIP',
                onConfirm: async (repoUrl) => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.zip';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;

                        const formData = new FormData();
                        formData.append('file', file);

                        showToast('Uploading and pushing...', 'info');

                        try {
                            const response = await fetch(`${API_BASE}/api/github/push-zip`, {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${state.token}` },
                                body: formData
                            });
                            const data = await response.json();
                            if (response.ok) {
                                showToast(`Pushed ${data.files_pushed} files to GitHub!`);
                                await loadRepos();
                            } else {
                                throw new Error(data.detail || 'Push failed');
                            }
                        } catch (err) {
                            showToast(err.message, 'error');
                        }
                    };
                    input.click();
                }
            });
        }

        function showCreatePushModal() {
            showModal({
                title: 'Create Repository & Push',
                subtitle: 'Enter a name for the new repository:',
                inputPlaceholder: 'my-awesome-project',
                confirmText: 'Next: Select ZIP',
                onConfirm: async (repoName) => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.zip';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;

                        const formData = new FormData();
                        formData.append('file', file);

                        showToast('Creating repo and pushing...', 'info');

                        try {
                            const response = await fetch(`${API_BASE}/api/github/create-and-push?name=${encodeURIComponent(repoName)}`, {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${state.token}` },
                                body: formData
                            });
                            const data = await response.json();
                            if (response.ok) {
                                showToast(`Repository created: ${data.repo_url}`);
                                await loadRepos();
                                render();
                            } else {
                                throw new Error(data.detail || 'Failed');
                            }
                        } catch (err) {
                            showToast(err.message, 'error');
                        }
                    };
                    input.click();
                }
            });
        }

        function showAnalyzeModal(fileId) {
            showModal({
                title: 'Analyze File',
                subtitle: 'What would you like to know about this file?',
                inputPlaceholder: 'e.g., Explain the code structure, find bugs, summarize...',
                confirmText: 'Analyze',
                onConfirm: async (question) => {
                    try {
                        showToast('Analyzing...', 'info');
                        const data = await api('/api/upload/analyze', {
                            method: 'POST',
                            body: JSON.stringify({ file_id: fileId, question })
                        });

                        // Show results in a modal
                        showModal({
                            title: 'Analysis Results',
                            subtitle: '',
                            showInput: false,
                            confirmText: 'Close',
                            onConfirm: () => {}
                        });

                        const modal = document.querySelector('.modal-overlay.active .modal');
                        modal.querySelector('.modal-subtitle').innerHTML = markdownToHtml(data.analysis);
                    } catch (e) {
                        showToast(e.message, 'error');
                    }
                }
            });
        }

        function showCodeReviewModal() {
            showModal({
                title: 'Code Review',
                subtitle: 'Paste your code below for AI review:',
                inputType: 'textarea',
                inputPlaceholder: 'Paste code here...',
                confirmText: 'Review',
                onConfirm: async (code) => {
                    try {
                        showToast('Reviewing code...', 'info');
                        const data = await api('/api/agent/code-review', {
                            method: 'POST',
                            body: JSON.stringify({ code })
                        });

                        showModal({
                            title: 'Code Review Results',
                            subtitle: '',
                            showInput: false,
                            confirmText: 'Close',
                            onConfirm: () => {}
                        });

                        const modal = document.querySelector('.modal-overlay.active .modal');
                        modal.querySelector('.modal-subtitle').innerHTML = markdownToHtml(data.review);
                    } catch (e) {
                        showToast(e.message, 'error');
                    }
                }
            });
        }

        function showFileAnalysisModal() {
            if (state.uploads.length === 0) {
                showToast('Upload files first on the Files page', 'info');
                state.currentPage = 'upload';
                render();
                return;
            }

            showModal({
                title: 'File Analysis',
                subtitle: 'Select a file to analyze:',
                showInput: false,
                confirmText: 'Close',
                onConfirm: () => {}
            });

            const modal = document.querySelector('.modal-overlay.active .modal');
            modal.querySelector('.modal-subtitle').innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">
                    ${state.uploads.map(f => `
                        <div class="file-item" style="cursor: pointer;" onclick="showAnalyzeModal('${f.id}'); document.querySelector('.modal-overlay.active').remove();">
                            <span class="file-icon">${getFileIcon(f.filename)}</span>
                            <div class="file-info">
                                <div class="file-name">${escapeHtml(f.filename)}</div>
                                <div class="file-meta">${formatSize(f.size)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ===== HELPERS =====
        function getFileIcon(filename) {
            if (filename.endsWith('.zip')) return '📦';
            if (filename.endsWith('.py')) return '🐍';
            if (filename.endsWith('.js') || filename.endsWith('.ts')) return '📜';
            if (filename.endsWith('.html')) return '🌐';
            if (filename.endsWith('.css')) return '🎨';
            if (filename.endsWith('.json')) return '📋';
            if (filename.endsWith('.md')) return '📝';
            if (filename.endsWith('.sql')) return '🗄️';
            if (filename.endsWith('.jpg') || filename.endsWith('.png')) return '🖼️';
            return '📄';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== DATA LOADING =====
        async function loadModels() {
            try {
                const data = await api('/api/settings/models');
                state.models = data.models || [];
            } catch (e) {
                console.error('Failed to load models', e);
            }
        }

        async function loadSessions() {
            try {
                const data = await api('/api/chat/sessions');
                state.sessions = data;
            } catch (e) {
                console.error('Failed to load sessions', e);
            }
        }

        async function loadUploads() {
            try {
                const data = await api('/api/upload/');
                state.uploads = data;
            } catch (e) {
                console.error('Failed to load uploads', e);
            }
        }

        async function loadRepos() {
            if (!state.user?.github_connected) return;
            try {
                const data = await api('/api/github/repos');
                state.repos = data.repos || [];
            } catch (e) {
                console.error('Failed to load repos', e);
            }
        }

        async function loadTasks() {
            try {
                const data = await api('/api/agent/tasks');
                state.tasks = data;
            } catch (e) {
                console.error('Failed to load tasks', e);
            }
        }

        async function initApp() {
            try {
                const user = await api('/api/auth/me');
                state.user = user;
                state.view = 'app';
                state.currentPage = 'chat';
                await Promise.all([loadModels(), loadSessions(), loadUploads(), loadRepos(), loadTasks()]);
                render();
            } catch (err) {
                state.view = 'auth';
                render();
            }
        }

        // ===== INIT =====
        if (state.token) {
            initApp();
        } else {
            render();
        }
    </script>
</body>
</html>
